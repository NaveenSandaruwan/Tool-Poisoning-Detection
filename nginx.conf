events {
    worker_connections 1024;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=batch_limit:10m rate=2r/s;
    
    # Request size limits
    client_max_body_size 1M;
    client_body_buffer_size 128k;

    # Upstream definitions (backend services)
    upstream poison_v2 {
        server poison-detection-v2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Uncomment when v1 is needed
    # upstream poison_v1 {
    #     server poison-detection-v1:8000 max_fails=3 fail_timeout=30s;
    #     keepalive 32;
    # }

    # Main server block
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Health check endpoint (nginx level)
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx-gateway"}\n';
            add_header Content-Type application/json;
        }

        # Route to poison detection v2 - single detection
        location /api/v2/poison/detect {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            # Proxy settings
            proxy_pass http://poison_v2/detect;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Route to poison detection v2 - batch detection
        location /api/v2/poison/batch_detect {
            # Stricter rate limiting for batch
            limit_req zone=batch_limit burst=5 nodelay;
            limit_req_status 429;

            # Larger size limit for batch requests
            client_max_body_size 5M;

            proxy_pass http://poison_v2/batch_detect;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Longer timeouts for batch processing
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Backend health check
        location /api/v2/poison/health {
            access_log off;
            proxy_pass http://poison_v2/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Uncomment for v1 model routes when needed
        # location /api/v1/poison/ {
        #     limit_req zone=api_limit burst=20 nodelay;
        #     
        #     proxy_pass http://poison_v1/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Connection "";
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     
        #     proxy_connect_timeout 30s;
        #     proxy_send_timeout 30s;
        #     proxy_read_timeout 30s;
        # }

        # API root - provide service info
        location /api {
            return 200 '{"service":"Model Gateway","version":"1.0","available_endpoints":["/api/v2/poison/detect","/api/v2/poison/batch_detect","/api/v2/poison/health"]}\n';
            add_header Content-Type application/json;
        }

        # Default location - return 404
        location / {
            return 404 '{"error":"Not Found","message":"Use /api/v2/poison/detect or /api/v2/poison/batch_detect"}\n';
            add_header Content-Type application/json;
        }
    }

    # HTTPS configuration (uncomment and configure SSL certificates)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Include all location blocks from above
    # }
}
